name: Docs Check

on:
  pull_request:

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Docs policy check
        env:
          DOCS_CHECK_BASE: ${{ github.event.pull_request.base.sha }}
          DOCS_CHECK_HEAD: ${{ github.sha }}
        run: pnpm run docs:check
