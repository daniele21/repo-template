name: Security Check

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Secret and sensitive logging scan
        run: pnpm run security:check

      - name: Dependency audit
        run: pnpm run deps:audit
